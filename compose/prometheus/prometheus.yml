---
global:
  scrape_interval: 15s
  evaluation_interval: 10s

# Alerting configuration (optional - can be removed if not using alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    scheme: http
    static_configs:
      - targets: ['localhost:9092']
    enable_compression: true
    enable_http2: true
    scrape_timeout: 10s

  # Node Exporter - System metrics (CPU, RAM, Disk, Network, etc.)
  # Runs with host networking, scraped on localhost
  - job_name: 'xrpl-validator'
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    scheme: http
    enable_compression: true
    enable_http2: true
    static_configs:
      - targets: ['127.0.0.1:9102']
        # Note: Using 127.0.0.1:9102 for dashboard compatibility
    metric_relabel_configs:
      # Drop ALL xrpl_* metrics from node_exporter to avoid duplicates
      # (xrpl_* metrics come from xrpl-monitor job below)
      - source_labels: [__name__]
        action: drop
        regex: ^xrpl_.*

  # XRPL Validator Monitor - State tracking, validation monitoring, alerts
  # Scrapes metrics from xrpl-monitor running on host with host networking
  - job_name: 'xrpl-monitor'
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    scheme: http
    enable_compression: true
    enable_http2: true
    static_configs:
      # Both monitor and Prometheus use host networking, so use localhost
      - targets: ['localhost:9094']
        labels:
          instance: 'xrpl-validator'
          service: 'xrpl-monitor'
