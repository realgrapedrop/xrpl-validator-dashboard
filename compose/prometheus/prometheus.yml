---
global:
  scrape_interval: 15s
  evaluation_interval: 10s

# Alerting configuration (optional - can be removed if not using alertmanager)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    scheme: http
    static_configs:
      - targets: ['localhost:9090']
    enable_compression: true
    enable_http2: true
    scrape_timeout: 10s

  # Node Exporter - System metrics (CPU, RAM, Disk, Network, etc.)
  # Runs as a container, provides server stats for the dashboard
  - job_name: 'xrpl-validator'
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    scheme: http
    enable_compression: true
    enable_http2: true
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: '127.0.0.1:9102'  # External port for clarity
    metric_relabel_configs:
      # Drop ALL xrpl_* metrics from node_exporter to avoid duplicates
      # (xrpl_* metrics come from xrpl-monitor job below)
      - source_labels: [__name__]
        action: drop
        regex: ^xrpl_.*

  # XRPL Validator Monitor - State tracking, validation monitoring, alerts
  # Scrapes metrics from xrpl-monitor service running on host
  - job_name: 'xrpl-monitor'
    scrape_interval: 5s
    scrape_timeout: 4s
    metrics_path: /metrics
    scheme: http
    enable_compression: true
    enable_http2: true
    static_configs:
      # Use host.docker.internal to reach host from container
      # Or use the actual host IP address
      - targets: ['host.docker.internal:9094']
        labels:
          instance: 'xrpl-validator'
          service: 'xrpl-monitor'
