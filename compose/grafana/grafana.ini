#################################### Server ####################################
[server]
# Leave defaults; running via Docker on port 3000

#################################### Security ##################################
[security]
# IMPORTANT: leave cookie_secure=false for HTTP; true would cause login loops on http://
cookie_secure = false
cookie_samesite = lax
allow_embedding = true

#################################### Users #####################################
[users]
# No anonymous viewers; you log in as admin (from env in docker-compose)
allow_org_create = false
viewers_can_edit = false
editors_can_admin = false

#################################### Auth ######################################
[auth]
# Ensure login form is shown
disable_login_form = false
disable_signout_menu = false

[auth.anonymous]
enabled = false

#################################### Analytics #################################
[analytics]
reporting_enabled = false
check_for_updates = true

#################################### Dashboards ################################
[dashboards]
min_refresh_interval = 5s

#################################### Panels ####################################
[panels]
disable_sanitize_html = true

##################################### Theme ####################################
[theme]
default_theme = light
custom_css = /usr/share/grafana/public/css/custom.css

##################################### HTTP ####################################
[http]
disable_sanitize_html = true
